name: 毎日イベント自動取得

on:
  schedule:
    - cron: '0 18 * * *'  # 毎日 03:00 JST（UTC 18:00）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージインストール
        run: pip install requests beautifulsoup4 python-dateutil

      - name: スクレイピング実行
        run: python scraper.py

      - name: events.json に変更があればコミット＆プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json
          git diff --cached --quiet || git commit -m "chore: update events $(date +'%Y-%m-%d')"
          git push